name: Pruebas Automatizadas - Página de Robedo

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub

jobs:
  test:
    runs-on: ubuntu-latest  # Usa un servidor Linux gratuito de GitHub
    
    steps:
    - name: 📥 Clonar el repositorio
      uses: actions/checkout@v4
    
    - name: 🐍 Instalar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'  # Versión estable de Python
    
    - name: 📦 Instalar Poetry
      run: pip install poetry
    
    - name: 🔧 Instalar dependencias
      run: poetry install
    
    - name: 🌐 Instalar navegadores de Playwright
      run: poetry run playwright install --with-deps chromium
    
    - name: 🧪 Ejecutar pruebas
      run: poetry run pytest tests/test_mi_pagina.py --alluredir=allure-results
    
    - name: 📊 Generar reporte de Allure
      run: |
        npm install -g allure-commandline
        allure generate allure-results --clean -o allure-report
    
    - name: 📤 Subir reporte como artefacto
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report
    
    - name: 📤 Subir resultados de Allure
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: allure-results

  deploy-report:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: 📥 Descargar reporte
      uses: actions/download-artifact@v4
      with:
        name: allure-report
        path: allure-report
    
    - name: 🚀 Publicar reporte en GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-report
        destination_dir: ./allure-report
        keep_files: false